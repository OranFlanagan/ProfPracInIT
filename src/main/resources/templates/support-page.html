<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Log</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --surface: #ffffff;
    --border: #1a1a1a;
    --accent: #d94f3d;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --grid-gap: 12px;
    --card-size: 140px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    align-items: center;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px;
  }

  .header {
    display: flex;
    align-items: center;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--border);
  }

  .logo {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }

  .logo span { color: var(--accent); }

  .section-label {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(3, var(--card-size));
    gap: var(--grid-gap);
  }

  .product-card {
    width: var(--card-size);
    height: var(--card-size);
    border: 2px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .product-card.active {
    border-color: var(--accent);
    background: #fff8f7;
  }

  .product-card.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
  }

  .card-id {
    font-size: 0.6rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 1px;
  }

  .card-name {
    font-size: 0.7rem;
    font-weight: 600;
    margin-top: 2px;
    line-height: 1.3;
  }

  .card-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 0.55rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 5px;
    background: var(--accent);
    color: white;
  }

  .card-link {
  text-decoration: none;
  color: inherit;
  display: block;
  }



  .statusbar {
    margin-top: 32px;
    display: flex;
    gap: 24px;
    padding: 12px 0;
    border-top: 1px solid #ccc;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .card-image {
    width: 100%;
    height: 150px;   
    object-fit: cover;
    border-radius: 6px;
}


  .statusbar span strong { color: var(--text); }
</style>
</head>
<body>

<header class="header">
  <div class="logo">Product<span>Log</span></div>
</header>

<div class="section-label">Products — Select to view ticket</div>
<div class="grid-wrap">
  <div class="product-grid">

   
<div th:each="product : ${products}">
  <a th:href="@{common-issues}" class="card-link">

    <div class="product-card active">    
      
      <div class="card-badge">open</div>
      
      <div class="card-id" 
           th:text="'#' + ${product.id}"></div>
      
      <div class="card-name" 
           th:text="${product.name}"></div>

      <img th:src="${product.urlString}" 
           alt="Product Image" 
           class="card-image">
    </div>
  </a>
</div>

    <div class="product-card">
      <div class="card-id">#002</div>
      <div class="card-name">Placeholder</div>
    </div>

    <div class="product-card">
      <div class="card-id">#003</div>
      <div class="card-name">Placeholder</div>
    </div>

    <div class="product-card">
      <div class="card-id">#004</div>
      <div class="card-name">Placeholder</div>
    </div>

    <div class="product-card">
      <div class="card-id">#005</div>
      <div class="card-name">Placeholder</div>
    </div>

    <div class="product-card">
      <div class="card-id">#006</div>
      <div class="card-name">Placeholder</div>
    </div>

    <div class="product-card">
      <div class="card-id">#007</div>
      <div class="card-name">Placeholder</div>
    </div>
    <div class="product-card">
      <div class="card-id">#008</div>
      <div class="card-name">Placeholder</div>
    </div>

    <div class="product-card">
      <div class="card-id">#009</div>
      <div class="card-name">Placeholder</div>
    </div>
</div>

</div>
</body>
</html>
