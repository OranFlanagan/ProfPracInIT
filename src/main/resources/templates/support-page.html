<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Log</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/product-log.css}">
  </head>

<body>

<header class="header">
  <div class="logo">Product<span>Log</span></div>
</header>

<div class="section-label">Products — Select to view ticket</div>
<div class="grid-wrap">
  <div class="product-grid">

   
<div th:each="product : ${products}">
<a th:href="@{/common-issues/{id}(id=${product.id})}" class="card-link">

    <div class="product-card active">    
      
      <div class="card-badge">open</div>
      
      <div class="card-id" 
           th:text="'#' + ${product.id}"></div>
      
      <div class="card-name" 
           th:text="${product.name}"></div>

      <img th:src="${product.urlString}" 
           alt="Product Image" 
           class="card-image">
    </div>
  </a>
</div>

    <div class="product-card">
      <div class="card-id">#002</div>

    </div>

    </div>

    </div>

    <div class="product-card">

    </div>

    <div class="product-card">

    </div>

    <div class="product-card">
      <div class="card-id">#007</div>
      <div class="card-name">Placeholder</div>
    </div>
    <div class="product-card">

      <div class="card-name">Placeholder</div>
    </div>

    <div class="product-card">
      <div class="card-id">#009</div>
      <div class="card-name">Placeholder</div>
    </div>
</div>

<div class="button">
<div class ="cant-find-button"> <button onclick="window.location.href='/email-form'">Can't find the product?</button>
  </div>
</div>

</div>
</body>
</html>
