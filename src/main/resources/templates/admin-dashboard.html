<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/admin-panel.css}">
</head>
<body>

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <img th:src="@{/images/brand-logo.png}" alt="Brand logo">
            <span class="topbar-email">Signed in as <strong th:text="${loggedInEmail}"></strong></span>
        </div>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>

    <!-- Toasts -->
    <div class="toast-container" aria-live="polite">
        <div th:if="${deleteSuccessMessage}" class="toast toast-success" th:text="${deleteSuccessMessage}"></div>
        <div th:if="${deleteErrorMessage}" class="toast toast-error" th:text="${deleteErrorMessage}"></div>
    </div>

    <div class="main">

        <a href="/staff-dashboard" class="back-link">← Back to staff dashboard</a>
        <div class="page-title">Admin panel</div>

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <!-- Register new user -->
        <div class="section">
            <div class="section-title">Register new user</div>
            <form class="register-form" action="/admin/staff" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="staff@example.com">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r.name()}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Invite user</button>
            </form>
        </div>

        <!-- Email template -->
        <div class="section">
            <div class="section-title">Ticket submission email template</div>
            <form action="/admin/email-template" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-group">
                    <label for="templateContent">Template content (HTML supported)</label>
                    <textarea id="templateContent" name="templateContent">[[${ticketEmailTemplate}]]</textarea>
                </div>
                <div style="margin-top: 12px;">
                    <button type="submit" class="btn btn-primary">Save template</button>
                </div>
            </form>
        </div>

        <!-- Current users -->
        <div class="section">
            <div class="section-title">Current users</div>
            <div class="table-wrap">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Notifications</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${users == null or #lists.isEmpty(users)}">
                            <td class="no-users" colspan="5">No users found.</td>
                        </tr>
                        <tr th:each="user : ${users}">

                            <td class="col-id" th:text="${user.id}"></td>

                            <td class="col-email" th:text="${user.email}"></td>

                            <td class="col-role">
                                <span class="role-badge"
                                      th:classappend="${user.role}"
                                      th:text="${user.role}">
                                </span>
                            </td>

                            <td class="col-notif">
                                <form th:action="@{'/admin/staff/' + ${user.id} + '/toggle-notifications'}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit"
                                            th:class="${user.receiveNotifications} ? 'btn-notif-on' : 'btn-notif-off'"
                                            th:text="${user.receiveNotifications} ? 'On' : 'Off'">
                                    </button>
                                </form>
                            </td>

                            <td class="col-actions">
                                <div class="actions-cell">

                                    <form th:action="@{'/admin/staff/' + ${user.email} + '/reset-password'}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-warning">Send reset email</button>
                                    </form>

                                    <form th:action="@{'/admin/staff/' + ${user.id} + '/role'}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <select name="role" class="table-select">
                                            <option th:each="r : ${roles}"
                                                    th:value="${r}"
                                                    th:text="${r.name()}"
                                                    th:selected="${r == user.role}">
                                            </option>
                                        </select>
                                        <button type="submit" class="btn btn-primary">Change role</button>
                                    </form>

                                    <form th:action="@{'/admin/staff/' + ${user.id} + '/delete'}"
                                          method="post"
                                          onsubmit="return confirm('Are you sure you want to delete this user?');">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-danger">Delete</button>
                                    </form>

                                </div>
                            </td>

                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</body>
</html>
