<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/staff-dashboard.css}">
</head>
<body>

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <img th:src="@{/images/brand-logo.png}" alt="Brand logo">
            <span class="topbar-email">Signed in as <strong th:text="${loggedInEmail}"></strong></span>
        </div>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>

    <!-- Toasts -->
    <div class="toast-container" aria-live="polite">
        <div th:if="${deleteSuccessMessage}" class="toast toast-success" th:text="${deleteSuccessMessage}"></div>
        <div th:if="${deleteErrorMessage}" class="toast toast-error" th:text="${deleteErrorMessage}"></div>
    </div>

    <div class="main">

        <a href="/demo" class="back-link">← Back to demo</a>

        <div class="page-header">
            <h1>Staff Dashboard</h1>
            <div class="admin-links" th:if="${isAdmin}">
                <a href="/admin" class="btn-admin">Admin panel</a>
                <a href="/admin-deflection-editor" class="btn-admin">Deflection page manager</a>
            </div>
        </div>

        <div class="sort-bar">
            <span class="sort-label">Sort</span>
            <a th:href="@{/staff-dashboard(sort='newest')}"
               class="sort-btn"
               th:classappend="${sort == 'newest'} ? ' sort-btn-active' : ''">Newest</a>
            <a th:href="@{/staff-dashboard(sort='oldest')}"
               class="sort-btn"
               th:classappend="${sort == 'oldest'} ? ' sort-btn-active' : ''">Oldest</a>
        </div>

        <div class="table-wrap">
            <table class="tickets-table">
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Submitter</th>
                        <th>Status</th>
                        <th>Assigned staff</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${tickets == null or #lists.isEmpty(tickets)}">
                        <td class="no-tickets" colspan="5">No tickets found.</td>
                    </tr>
                    <tr th:each="ticket : ${tickets}">

                        <td class="column-orderNum" th:text="${ticket.orderNum}"></td>

                        <td class="column-name" th:text="${ticket.name}"></td>

                        <td class="column-status">
                            <span class="status-badge"
                                  th:text="${ticket.status}"
                                  th:classappend="' ' + ${ticket.status}">
                            </span>
                        </td>

                        <td class="column-assignedStaff">
                            <form class="status-form"
                                  th:action="@{'/tickets/' + ${ticket.orderNum} + '/assign'}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="redirectTo" value="/staff-dashboard">
                                <select name="assignedStaff" class="table-select" aria-label="Assign staff">
                                    <option value="" th:selected="${ticket.assignedStaff == null}">—</option>
                                    <option th:each="staff : ${staffList}"
                                            th:value="${staff.email}"
                                            th:text="${staff.email}"
                                            th:selected="${staff.email == ticket.assignedStaff}">
                                    </option>
                                </select>
                                <button type="submit" class="btn-table btn-table-teal">Assign</button>
                            </form>
                        </td>

                        <td class="column-actions">
                            <div class="actions-cell">
                                <a th:href="@{'/tickets/' + ${ticket.orderNum}}" class="btn-table">View</a>

                                <form class="status-form"
                                      th:action="@{'/tickets/' + ${ticket.orderNum} + '/status'}"
                                      method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="redirectTo" value="/staff-dashboard">
                                    <select name="status" class="table-select" aria-label="Select ticket status">
                                        <option th:each="statusOption : ${ticketStatuses}"
                                                th:value="${statusOption}"
                                                th:text="${statusOption}"
                                                th:selected="${statusOption == ticket.status}">
                                        </option>
                                    </select>
                                    <button type="submit" class="btn-table">Update</button>
                                </form>

                                <form th:action="@{'/tickets/' + ${ticket.orderNum} + '/delete'}"
                                      method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this ticket?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn-table btn-table-red">Delete</button>
                                </form>
                            </div>
                        </td>

                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</body>
</html>
