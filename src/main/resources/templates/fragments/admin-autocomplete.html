<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

  <th:block th:fragment="suggestions">
    <li th:each="product : ${suggestions}"
        class="autocomplete-item"
        th:data-name="${product.name}"
        onclick="selectAdminSuggestion(this.dataset.name)">
      <span class="autocomplete-name" th:text="${product.name}"></span>
    </li>
  </th:block>

  <th:block th:fragment="empty"></th:block>

</body>
</html>
