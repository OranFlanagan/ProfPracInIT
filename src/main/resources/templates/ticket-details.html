<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/ticket-details.css}">
</head>
<body>

    <!-- Top bar -->
    <div class="topbar">
        <img th:src="@{/images/brand-logo.png}" alt="Brand logo">
        <span class="topbar-right">Staff portal</span>
    </div>

    <div class="main">

        <a href="/staff-dashboard" class="back-link">← Back to dashboard</a>

        <div th:if="${successMessage}" class="flash-success" th:text="${successMessage}"></div>

        <div class="page-header">
            <div class="page-title">Ticket #<span th:text="${ticket.orderNum}"></span></div>
            <form th:action="@{'/tickets/' + ${ticket.orderNum} + '/delete'}" method="post"
                  onsubmit="return confirm('Are you sure you want to delete this ticket?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-danger">Delete ticket</button>
            </form>
        </div>

        <!-- Status & assignment -->
        <div class="card">
            <div class="card-title">Status & assignment</div>
            <div class="info-grid">

                <div class="info-item">
                    <div class="info-label">Current status</div>
                    <div class="info-value">
                        <span class="status-badge" th:text="${ticket.status}"
                              th:classappend="' ' + ${ticket.status}"></span>
                    </div>
                    <form class="inline-form"
                          th:action="@{'/tickets/' + ${ticket.orderNum} + '/status'}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="redirectTo" th:value="@{'/tickets/' + ${ticket.orderNum}}">
                        <select name="status" class="table-select" aria-label="Select ticket status">
                            <option th:each="statusOption : ${ticketStatuses}"
                                    th:value="${statusOption}"
                                    th:text="${statusOption}"
                                    th:selected="${statusOption == ticket.status}">
                            </option>
                        </select>
                        <button type="submit" class="btn btn-primary">Update</button>
                    </form>
                </div>

                <div class="info-item">
                    <div class="info-label">Assigned staff</div>
                    <div class="info-value" th:text="${ticket.assignedStaff != null ? ticket.assignedStaff : '—'}"></div>
                    <form class="inline-form"
                          th:action="@{'/tickets/' + ${ticket.orderNum} + '/assign'}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="redirectTo" th:value="@{'/tickets/' + ${ticket.orderNum}}">
                        <select name="assignedStaff" class="table-select" aria-label="Assign staff">
                            <option value="" th:selected="${ticket.assignedStaff == null}">—</option>
                            <option th:each="staff : ${staffList}"
                                    th:value="${staff.email}"
                                    th:text="${staff.email}"
                                    th:selected="${staff.email == ticket.assignedStaff}">
                            </option>
                        </select>
                        <button type="submit" class="btn btn-primary">Assign</button>
                    </form>
                </div>

            </div>
        </div>

        <!-- Customer details -->
        <div class="card">
            <div class="card-title">Customer details</div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Name</div>
                    <div class="info-value" th:text="${ticket.name}"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value" th:text="${ticket.email}"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Phone</div>
                    <div class="info-value" th:text="${ticket.phoneNum != null ? ticket.phoneNum : '—'}"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Invoice number</div>
                    <div class="info-value" th:text="${ticket.invoiceNum != null ? ticket.invoiceNum : '—'}"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">School / organisation</div>
                    <div class="info-value" th:text="${ticket.schoolOrganisation != null ? ticket.schoolOrganisation : '—'}"></div>
                </div>
                <div class="info-item">
                    <div class="info-label">Order #</div>
                    <div class="info-value" th:text="${ticket.orderNum}"></div>
                </div>
            </div>
        </div>

        <!-- Issue description -->
        <div class="card">
            <div class="card-title">Issue description</div>
            <div class="issue-text" th:text="${ticket.issueDescription}"></div>
        </div>

        <!-- Attachment -->
        <div class="card">
            <div class="card-title">Attachment</div>
            <div class="info-value">
                <span th:if="${ticket.attachmentFilename != null}">
                    <a th:href="${ticket.attachmentUrl}"
                       th:text="${ticket.attachmentFilename}"
                       target="_blank">Download</a>
                </span>
                <span th:unless="${ticket.attachmentFilename != null}" style="color: var(--muted);">
                    No attachment
                </span>
            </div>
        </div>

        <!-- Internal notes -->
        <div class="card">
            <div class="card-title">Internal notes</div>
            <form th:action="@{'/tickets/' + ${ticket.orderNum} + '/internal-notes'}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <textarea class="notes-textarea"
                          name="internalNotes"
                          rows="5"
                          placeholder="Add internal notes visible only to staff..."
                          th:text="${ticket.internalNotes}"></textarea>
                <div style="margin-top: 10px;">
                    <button type="submit" class="btn btn-primary">Save notes</button>
                </div>
            </form>
        </div>

    </div>

</body>
</html>
