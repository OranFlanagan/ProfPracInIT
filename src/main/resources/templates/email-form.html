<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Ticket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/ticket.css}">

</head>
<body>

    <div class="container">

<div class="brand-header">
            <img th:src="@{/images/brand-logo.png}" alt="Brand logo" class="brand-logo">
            <div class="brand-header-right">Support portal</div>
        </div>

        <div class="page-header">
            <h1>Create a support ticket</h1>
            <p>Fill in the details below and we'll get back to you as soon as possible.</p>
        </div>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <div class="form-card">
            <form th:action="@{/send-email}" th:object="${ticket}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">

                    <!-- Name -->
                    <div class="form-group">
                        <label for="name">Full name</label>
                        <input type="text" id="name" th:field="*{name}" placeholder="Jane Smith" required>
                        <div th:if="${#fields.hasErrors('name')}" class="field-error">
                            <span th:errors="*{name}"></span>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" th:field="*{email}" placeholder="jane@example.com" required>
                        <div th:if="${#fields.hasErrors('email')}" class="field-error">
                            <span th:errors="*{email}"></span>
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label for="phoneNum">Phone number <span style="font-size:0.65rem;">(optional)</span></label>
                        <input type="text" id="phoneNum" th:field="*{phoneNum}" placeholder="+353 1 234 5678">
                        <div th:if="${#fields.hasErrors('phoneNum')}" class="field-error">
                            <span th:errors="*{phoneNum}"></span>
                        </div>
                    </div>

                    <!-- Invoice -->
                    <div class="form-group">
                        <label for="invoiceNum">Invoice number <span style="font-size:0.65rem;">(if applicable)</span></label>
                        <input type="text" id="invoiceNum" th:field="*{invoiceNum}" placeholder="INV-00123">
                        <div th:if="${#fields.hasErrors('invoiceNum')}" class="field-error">
                            <span th:errors="*{invoiceNum}"></span>
                        </div>
                    </div>

                    <!-- Organisation -->
                    <div class="form-group full">
                        <label for="schoolOrganisation">School / organisation</label>
                        <input type="text" id="schoolOrganisation" th:field="*{schoolOrganisation}" placeholder="e.g. St. Patrick's Secondary School">
                        <div th:if="${#fields.hasErrors('schoolOrganisation')}" class="field-error">
                            <span th:errors="*{schoolOrganisation}"></span>
                        </div>
                    </div>

                    <div class="form-divider"></div>

                    <!-- Issue Description -->
                    <div class="form-group full">
                        <label for="issueDescription">Issue description</label>
                        <textarea id="issueDescription" th:field="*{issueDescription}" placeholder="Describe the issue you're experiencing in as much detail as possible..." required></textarea>
                        <div th:if="${#fields.hasErrors('issueDescription')}" class="field-error">
                            <span th:errors="*{issueDescription}"></span>
                        </div>
                    </div>

                    <!-- Attachment -->
                    <div class="form-group full file-wrap">
                        <label for="attachment">Attachment <span style="font-size:0.65rem;">(optional)</span></label>
                        <input type="file" id="attachment" th:field="*{attachment}"
                               th:attr="data-max-size=${maxFileSize}"
                               accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,.mp4,.txt,.csv,.doc,.docx,.xlsx,.odt,.ods">
                        <span class="file-hint">Max file size: <span th:text="${maxFileSize}"></span> — PDF, image, video, or document</span>
                        <div id="file-error" class="field-error"></div>
                    </div>

                </div>

                <div class="form-actions">
                    <a class="back-button" th:href="@{/support-page}">← Back</a>
                    <button type="submit">Submit ticket</button>
                </div>

            </form>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var fileInput = document.getElementById('attachment');
            var fileError = document.getElementById('file-error');
            var maxSizeStr = fileInput.getAttribute('data-max-size');

            function parseSize(str) {
                if (!str) return 52428800;
                str = str.trim().toUpperCase();
                if (str.endsWith('MB')) return parseInt(str) * 1024 * 1024;
                if (str.endsWith('KB')) return parseInt(str) * 1024;
                if (str.endsWith('GB')) return parseInt(str) * 1024 * 1024 * 1024;
                return parseInt(str);
            }

            var maxSize = parseSize(maxSizeStr);

            fileInput.addEventListener('change', function() {
                if (this.files[0] && this.files[0].size > maxSize) {
                    fileError.innerText = 'File is too large. Max allowed is ' + maxSizeStr + '.';
                    this.value = '';
                } else {
                    fileError.innerText = '';
                }
            });
        });
    </script>

</body>
</html>
