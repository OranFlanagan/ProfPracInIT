<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Something went wrong</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 8px; text-align: center; max-width: 400px; }
        h2 { color: #333; }
        p { color: #666; }
        a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #4CAF50; color: white; border-radius: 4px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Something went wrong</h2>
        <p th:text="${status != null} ? 'Error ' + ${status} : 'An unexpected error occurred.'"></p>
        <a href="/staff-dashboard">Go back</a>
    </div>
</body>
</html>
