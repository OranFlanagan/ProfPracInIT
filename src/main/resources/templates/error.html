<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something went wrong</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f7f9;
            --surface: #ffffff;
            --border-strong: rgba(0, 0, 0, 0.13);
            --teal: #0ea5a0;
            --teal-light: #e0f7f6;
            --teal-dark: #0b7a76;
            --text: #0f172a;
            --muted: #94a3b8;
            --red: #e53935;
            --red-light: #fdecea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .box {
            background: var(--surface);
            border: 0.5px solid var(--border-strong);
            border-radius: 12px;
            padding: 40px 36px;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .error-icon {
            width: 44px;
            height: 44px;
            background: var(--red-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.2rem;
            color: var(--red);
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text);
            margin-bottom: 8px;
        }

        p {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.55;
            margin-bottom: 28px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-primary {
            display: block;
            padding: 11px 20px;
            background: var(--teal);
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            transition: background 0.12s;
        }

        .btn-primary:hover { background: var(--teal-dark); }

        .btn-ghost {
            display: block;
            padding: 11px 20px;
            background: transparent;
            color: var(--muted);
            border: 0.5px solid var(--border-strong);
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            transition: background 0.12s, color 0.12s;
        }

        .btn-ghost:hover {
            background: var(--bg);
            color: var(--text);
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="error-icon">✕</div>
        <h2>Something went wrong</h2>
        <p th:text="${status != null} ? 'Error ' + ${status} + ' — please try again or contact support.' : 'An unexpected error occurred. Please try again.'"></p>
        <div class="links">
            <a href="/support-page" class="btn-ghost">Back to support page</a>
        </div>
    </div>

</body>
</html>
