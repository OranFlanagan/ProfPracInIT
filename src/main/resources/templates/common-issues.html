<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/common-issues.css}">
    <script th:src="@{/js/common-issues.js}" defer></script>
</head>
<body>

    <!-- Top bar -->
    <div class="topbar">
        <img th:src="@{/images/brand-logo.png}" alt="Brand logo">
        <span class="topbar-right">Support portal</span>
    </div>

    <div class="container">

        <!-- Product box -->
        <div class="product-box">
            <div class="product-image">
                <img th:src="${product.urlString}" th:alt="${product.name}">
            </div>
            <div class="product-info">
                <div class="card-id" th:text="'#' + ${product.id}"></div>
                <h2 class="product-title" th:text="${product.name}">Product Name</h2>
                <p class="product-code"
                   th:if="${product.code != null and product.code != ''}"
                   th:text="'SKU: ' + ${product.code}">
                </p>
                <a href="/support-page" class="change-product">← Change product</a>
            </div>
        </div>

        <!-- Highlight banner -->
        <div class="highlight-box">
            <p>Main Issue / Alert for this product</p>
        </div>

        <!-- Section label -->
        <div class="section-label">Known issues — select to view fix</div>

        <!-- Issues -->
        <div class="issues-section">

            <div th:each="issue, iterStat : ${issues}"
                 class="issue-card"
                 th:classappend="${iterStat.index >= 3} ? ' issue-card--hidden' : ''"
                 th:attr="data-issue-id=${issue.id},data-product-id=${product.id}"
                 onclick="toggleFix(this)">
                <h3 th:text="${issue.Title}">Issue Title</h3>
                <div class="fix-panel" style="display:none;"></div>
            </div>

            <div th:if="${#lists.size(issues) < 1}" class="issue-card issue-card--empty">
                <h3>No issues found</h3>
            </div>
            <div th:if="${#lists.size(issues) < 2}" class="issue-card issue-card--empty">
                <h3>—</h3>
            </div>
            <div th:if="${#lists.size(issues) < 3}" class="issue-card issue-card--empty">
                <h3>—</h3>
            </div>

        </div>

        <!-- Show more -->
        <div class="show-more-wrap" th:if="${#lists.size(issues) > 3}">
            <button class="show-more-btn" onclick="toggleMoreIssues(this)">Show more issues</button>
        </div>

        <!-- Can't find button -->
        <div class="cant-find-button">
            <button onclick="window.location.href='/email-form'">Can't find a fix?</button>
        </div>

    </div>

</body>
</html>
