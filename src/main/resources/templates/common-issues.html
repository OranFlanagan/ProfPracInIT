<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Support</title>
    <link rel="stylesheet" th:href="@{/styles/common-issues.css}">
    <link rel="stylesheet" th:href="@{/styles/product-log.css}">
    <script th:src="@{/js/common-issues.js}"></script>
</head>
<body>

    <div class="container">

      <!-- Product Display -->
<div class="product-box">
    <div class="product-image">
        <img th:src="${product.urlString}" 
             th:alt="${product.name}"
             class="card-image">
    </div>

    <div class="card-id" th:text="'#' + ${product.id}"></div>

    <h2 class="product-title" th:text="${product.name}">Product Name</h2>

<p class="product-code" th:text="'SKU: ' + ${product.code}" th:if="${product.code != null and product.code != ''}"></p>
    <a href="/support-page" class="change-product">Change Product</a>
</div>

        <!-- Highlight Banner -->
        <div class="highlight-box">
            <p>Main Issue / Alert for this product</p>
        </div>

        <!-- Common Issues -->
<div class="issues-section">

    <div th:each="issue, iterStat : ${issues}"
         th:if="${iterStat.index < 3}"
         class="issue-card"
         th:attr="data-issue-id=${issue.id}"
         onclick="toggleFix(this)">

        <h3 th:text="${issue.Title}">Issue Title</h3>

        <div class="fix-panel" style="display:none;"></div>

    </div>

    <div th:if="${#lists.size(issues) < 1}" class="issue-card issue-card--empty">
        <h3>No issues found</h3>
    </div>
    <div th:if="${#lists.size(issues) < 2}" class="issue-card issue-card--empty">
        <h3>—</h3>
    </div>
    <div th:if="${#lists.size(issues) < 3}" class="issue-card issue-card--empty">
        <h3>—</h3>
    </div>

</div>

    <!-- Can't find button -->
    <div class="cant-find-button">
        <button onclick="window.location.href='/email-form'">Can't find a fix?</button>
    </div>

</body>
</html>
